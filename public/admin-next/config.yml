# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.104.3/schema/sveltia-cms.json
backend:
  name: github
  repo: eduardoyi/RSB
  branch: main
  base_url: https://rsb-oauth.eduardoyi.workers.dev
  auth_endpoint: auth

media_folder: /public/media
public_folder: /media

media_library:
  name: cloudflare_r2

media_libraries:
  cloudflare_r2:
    bucket: rsb-media
    account_id: 5214720bdfaad708ec6cbf39c4725c92
    public_url: https://pub-54fd8d7ed7d74876bf7af598d20e0c7b.r2.dev
    prefix: cms-uploads/
    access_key_id: 57add91debe30bd52c3ab6009a2d5a83

locale: en

collections:
  - name: posts
    label: Blog Posts
    folder: src/content/posts
    create: true
    slug: "{{fields.slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "Drafts", field: status, pattern: "draft" }
      - { label: "Published", field: status, pattern: "published" }
      - { label: "Recent", field: date, pattern: "202" }
    editor:
      preview: false
    fields:
      - label: Status
        name: status
        widget: select
        options:
          - { label: Draft, value: draft }
          - { label: Published, value: published }
        default: draft
        hint: "Draft posts stay out of the public site, RSS feed, and search indexing until you switch them to Published."
      - { label: Title, name: title, widget: string }
      - { label: Body, name: body, widget: markdown }
      - { label: Slug, name: slug, widget: string, hint: "URL-safe identifier used as the post URL (e.g. my-post-title)" }
      - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Author, name: author, widget: string, required: false, default: "Eduardo Yi" }
      - { label: Featured Image, name: featured_image, widget: image, required: false }
      - { label: Featured Image Alt, name: featured_image_alt, widget: string, required: false }
      - label: "Podcast Audio"
        name: podcast_audio
        widget: file
        required: false
        accept: audio/*
        media_library:
          name: cloudflare_r2
        hint: "Upload or select an audio file from Cloudflare R2."

  - name: programs
    label: Programs
    folder: src/content/programs
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: ID, name: id, widget: string, hint: "URL-safe identifier (e.g. my-app)" }
      - { label: Title, name: title, widget: string }
      - { label: Version, name: version, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Splash Image, name: splash_image, widget: image, required: false }
      - { label: Launch URL, name: launch_url, widget: string, hint: "Full URL to the program" }

  - name: redirects
    label: Redirects
    folder: src/content/redirects
    create: true
    slug: "{{fields.from | slugify}}"
    identifier_field: from
    fields:
      - { label: "From Path", name: from, widget: string, hint: "Source path (e.g. /post/old-slug)" }
      - { label: "To Path", name: to, widget: string, hint: "Destination path or full URL (e.g. /post/new-slug)" }
      - label: "Status Code"
        name: status
        widget: select
        options: ["301", "302"]
        default: "301"
        hint: "301 = permanent redirect, 302 = temporary redirect"
